# Конфигурация сервера FileHub

[server]
# Адрес, на котором сервер принимает подключения (0.0.0.0 - все интерфейсы)
host = 0.0.0.0
# Порт для управляющих команд
port = 4540
# Порт для передачи данных
data_port = 4541
# Максимальное количество одновременных подключений
max_connections = 10
# Таймаут неактивного соединения в секундах
connection_timeout = 300

[shares]
# Файл для хранения информации о раздачах
storage_file = data/shares_data.json
# Файл для хранения информации о пользователях
users_file = data/users_data.json
# Интервал очистки неактивных раздач в часах
cleanup_interval_hours = 1
# Время неактивности раздачи до её удаления в днях
inactive_days = 3
# Интервал автоматического сохранения данных в минутах
save_interval_minutes = 5
# Максимальный размер файла для раздачи в МБ (0 - без ограничений)
max_file_size_mb = 0
# Максимальное количество файлов в раздаче-папке
max_files_in_folder = 1000

[network]
# Размер буфера передачи данных в байтах
buffer_size = 8192
# Максимальный размер JSON-сообщения в байтах
max_json_size = 1048576
# Использовать сжатие данных
compression = false

[logging]
# Включить логирование
enabled = true
# Путь к файлу логов
log_file = logs/hub.log
# Уровень логирования (DEBUG, INFO, WARNING, ERROR)
log_level = INFO
# Логировать передачи файлов
log_transfers = true
# Максимальный размер файла логов в МБ
max_log_size_mb = 10

[security]
# Принимать подключения только с локального адреса
local_only = false
# Список разрешённых IP-адресов (через запятую)
allowed_ips = 
# Список заблокированных IP-адресов (через запятую)
blocked_ips = 
# Максимальное количество раздач на одного пользователя
max_shares_per_user = 100
# Запрещённые расширения файлов (через запятую, например: .exe,.bat)
blocked_extensions = 
# Минимальная длина пароля
password_min_length = 1
# Требовать пароль для подключения
require_password = true
# Включить шифрование передачи файлов
encryption_enabled = true