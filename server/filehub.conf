# Конфигурация FileHub
[server]
host = 0.0.0.0
port = 5000
data_port = 5001
max_connections = 10
connection_timeout = 300

[shares]
storage_file = data/shares_data.json
users_file = data/users_data.json
cleanup_interval_hours = 1
inactive_days = 3
save_interval_minutes = 5
max_file_size_mb = 0
max_files_in_folder = 1000

[network]
buffer_size = 8192
max_json_size = 1048576

[logging]
enabled = true
log_file = logs/hub.log
log_level = INFO
log_transfers = true
max_log_size_mb = 10

[security]
local_only = false
allowed_ips = 
blocked_ips = 
max_shares_per_user = 50
blocked_extensions = 
password_min_length = 4
require_password = true
tls_enabled = true
tls_cert_dir = certs
