# Конфигурация клиента FileHub

[connection]
server_host = localhost
server_port = 5000
data_port = 5001
connection_timeout = 30

[downloads]
download_dir = downloads
max_retries = 3
verify_files = false

[shares]
st_dir = my_shares
st_file = {share_id}.json
sync_shares_on_connect = true

[interface]
show_progress = true
confirm_downloads = false
auto_reconnect = false

[logging]
enabled = true
log_file = client.log
log_level = INFO
log_transfers = true
max_log_size_mb = 10

[security]
remember_password = true
password_hash_file = client_pass.hash

[service]
auto_reconnect = true
reconnect_interval = 30
