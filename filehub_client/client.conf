# Конфигурация клиента FileHub

[connection]
# Адрес сервера
server_host = rpi.dlike.ru
# Порт управляющих команд
server_port = 4540
# Порт передачи данных
data_port = 4541
# Таймаут подключения в секундах
connection_timeout = 30

[downloads]
# Директория для скачанных файлов
download_dir = downloads
# Максимальное количество попыток скачивания
max_retries = 3
# Проверять целостность файлов после скачивания
verify_files = false

[shares]
# Директория для хранения информации о раздачах
# Поддерживаются вложенные папки, например: data/shares или D:/filehub/shares
st_dir = my_shares
# Формат имени файла: {share_id} будет заменен на ID раздачи
st_file = {share_id}.json
# Автоматическая синхронизация локальных раздач с сервером при подключении
sync_shares_on_connect = true

[interface]
# Показывать прогресс при передаче файлов
show_progress = true
# Запрашивать подтверждение перед скачиванием
confirm_downloads = false
# Автоматически переподключаться при обрыве связи
auto_reconnect = false

[security]
# Запоминать пароль (сохраняется только хеш)
remember_password = true
# Файл для хранения хешей паролей
password_hash_file = client_pass.hash